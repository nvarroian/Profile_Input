<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity 2 — Profile Card</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f3ee;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d3d1c7;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 420px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #d3d1c7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 4px;
      color: #1a1a18;
      min-height: 28px;
    }

    .tagline {
      font-size: 14px;
      color: #888780;
      margin: 0 0 24px;
      min-height: 20px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e6e0;
      margin: 0 0 24px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-item label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888780;
      margin-bottom: 3px;
    }

    .info-item span {
      font-size: 14px;
      color: #1a1a18;
      font-weight: 500;
      min-height: 20px;
      display: block;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888780;
      margin: 0 0 8px;
    }

    .bio {
      font-size: 14px;
      color: #5f5e5a;
      line-height: 1.7;
      margin: 0 0 24px;
      min-height: 40px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      background: #f1efe8;
      border: 1px solid #d3d1c7;
      font-size: 12px;
      color: #5f5e5a;
      min-width: 40px;
      display: inline-block;
    }

    .contact-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #5f5e5a;
    }

    .contact-item .icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #f1efe8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .contact-item span {
      min-height: 18px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="card">


    <!-- Name and tagline -->
    <h2 id="name"></h2>
    <p class="tagline" id="tagline"></p>

    <hr class="divider" />

    <!-- Info grid -->
    <div class="info-grid">
      <div class="info-item">
        <label>Age</label>
        <span id="age"></span>
      </div>
      <div class="info-item">
        <label>Hometown</label>
        <span id="hometown"></span>
      </div>
      <div class="info-item">
        <label>Course</label>
        <span id="course"></span>
      </div>
      <div class="info-item">
        <label>Year level</label>
        <span id="year-level"></span>
      </div>
    </div>

    <!-- Bio -->
    <p class="section-title">About</p>
    <p class="bio" id="bio"></p>

    <!-- Hobbies / interests as badges -->
    <p class="section-title">Interests</p>
    <div class="badge-row">
      <span class="badge" id="interest-1"></span>
      <span class="badge" id="interest-2"></span>
      <span class="badge" id="interest-3"></span>
    </div>

    <hr class="divider" />

    <!-- Contact info -->
    <p class="section-title">Contact</p>
    <div class="contact-row">
      <div class="contact-item">
        <span id="email"></span>
      </div>
      <div class="contact-item">
        <span id="github"></span>
      </div>
      <div class="contact-item">
        <span id="location"></span>
      </div>
    </div>

  </div>

  <script>

    // ACTIVITY 2 — Fill in the profile card
    // Use getElementById to populate every field
    // Do NOT edit the HTML above — only write JS
    // ─────────────────────────────────────────
  </script>

</body>
</html>
